[BitTorrent]
Session\DefaultSavePath=/downloads/
Session\TempPath=/downloads/incomplete/
Session\TempPathEnabled=true
# No seeding — stop the moment the torrent finishes downloading.
# Ratio 0 + seeding minutes 0 means "stop seeding immediately on completion".
# MaxRatioAction = 1 removes the torrent from qBit but leaves the files on disk,
# so *arr's import (move or hardlink) still finds them.
Session\GlobalMaxRatio=0
Session\GlobalMaxSeedingMinutes=0
Session\MaxRatioAction=1
Session\AddTorrentPaused=false

[Preferences]
WebUI\Address=*
WebUI\Port=8090
WebUI\LocalHostAuth=false
